services:
  n8n:
    build:
      context: ./n8n
      dockerfile: Dockerfile
    container_name: n8n
    restart: on-failure
    ports:
      - "5678:5678"
    env_file: .env
    volumes:
      - ./data/n8n:/home/node/.n8n
      - ./data/db:/data/db
      - ./workflows:/workflows
    depends_on:
      - python-api

  python-api:
    image: python:3.11-slim
    container_name: find-me-job-python-api
    restart: on-failure
    working_dir: /app
    command: >
      sh -c "pip install -r requirements.txt -q &&
             uvicorn main:app --host 0.0.0.0 --port 8001"
    volumes:
      - ./python-api:/app
      - ./data/db:/data/db
      - ./cv.docx:/data/cv.docx
      - ./params:/data/params
    ports:
      - "8001:8001"
