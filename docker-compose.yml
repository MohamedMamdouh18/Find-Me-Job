services:
  n8n:
    build:
      context: ./n8n
      dockerfile: Dockerfile
    container_name: n8n
    restart: on-failure
    ports:
      - "5678:5678"
    env_file: .env
    volumes:
      - ./data/n8n:/home/node/.n8n
      - ./data/db:/data/db
      - ./workflows:/workflows
    depends_on:
      - python-api

  python-api:
    build:
      context: ./python-api
      dockerfile: Dockerfile
    container_name: find-me-job-python-api
    restart: on-failure
    volumes:
      - ./data/db:/data/db
      - ./cv.docx:/data/cv.docx
      - ./params:/data/params
    ports:
      - "8001:8001"
